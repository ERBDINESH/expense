name: moniqo
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: ^0.19.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  collection: ^1.18.0
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.12
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 23

flutter_native_splash:
  color: "#061a08"
  image: assets/app_icon.png
  android_12:
    image: assets/app_icon.png
    color: "#061a08"
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
